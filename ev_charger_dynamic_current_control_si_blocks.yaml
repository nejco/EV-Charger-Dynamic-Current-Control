blueprint:
  name: EV Charger Dynamic Current Control (External Time Block)
  description: >
    Dynamically adjusts EV charger current to stay below the agreed power for the
    currently active time block. The active block must be provided by an entity
    whose state is 1, 2, 3, 4, or 5.

    Block values are entered in watts.
    The block value is treated as a hard upper limit.
    Tolerance is only used when deciding whether it is safe to increase current.
  domain: automation
  input:
    charger_entity:
      name: Charger current entity
      description: Number entity used to set charger current.
      selector:
        entity:
          domain: number

    power_meter_entity:
      name: Power meter entity
      description: Sensor with net grid power in watts. Positive should mean import from grid.
      selector:
        entity:
          domain: sensor

    time_block_entity:
      name: Time block entity
      description: Entity whose state is the current time block (1-5).
      selector:
        entity: {}

    supported_current_settings:
      name: Supported current settings
      description: Comma-separated list of allowed charging currents, e.g. 6,8,10,13,16
      default: "6,8,10,13,16"
      selector:
        text: {}

    tolerance:
      name: Increase tolerance
      description: >
        Safety margin in watts used only before increasing charging current.
        Charging current will only increase if measured power is at least this
        much below the block limit.
      default: 300
      selector:
        number:
          min: 0
          max: 10000
          step: 50
          unit_of_measurement: W
          mode: box

    agreed_power_block_1:
      name: Agreed power - block 1
      description: Hard upper limit for block 1, in watts.
      default: 6500
      selector:
        number:
          min: 0
          max: 50000
          step: 100
          unit_of_measurement: W
          mode: box

    agreed_power_block_2:
      name: Agreed power - block 2
      description: Hard upper limit for block 2, in watts.
      default: 8000
      selector:
        number:
          min: 0
          max: 50000
          step: 100
          unit_of_measurement: W
          mode: box

    agreed_power_block_3:
      name: Agreed power - block 3
      description: Hard upper limit for block 3, in watts.
      default: 8000
      selector:
        number:
          min: 0
          max: 50000
          step: 100
          unit_of_measurement: W
          mode: box

    agreed_power_block_4:
      name: Agreed power - block 4
      description: Hard upper limit for block 4, in watts.
      default: 14000
      selector:
        number:
          min: 0
          max: 50000
          step: 100
          unit_of_measurement: W
          mode: box

    agreed_power_block_5:
      name: Agreed power - block 5
      description: Hard upper limit for block 5, in watts.
      default: 15000
      selector:
        number:
          min: 0
          max: 50000
          step: 100
          unit_of_measurement: W
          mode: box

mode: single

trigger:
  - platform: time_pattern
    minutes: "/1"

variables:
  charger_entity: !input charger_entity
  power_meter_entity: !input power_meter_entity
  time_block_entity: !input time_block_entity
  tolerance: !input tolerance
  supported_current_settings_raw: !input supported_current_settings

  agreed_power_block_1: !input agreed_power_block_1
  agreed_power_block_2: !input agreed_power_block_2
  agreed_power_block_3: !input agreed_power_block_3
  agreed_power_block_4: !input agreed_power_block_4
  agreed_power_block_5: !input agreed_power_block_5

  valid_amps: >
    {{ supported_current_settings_raw
       .split(',')
       | map('trim')
       | reject('eq', '')
       | map('int')
       | unique
       | list
       | sort }}

  grid_power: "{{ states(power_meter_entity) | float(0) }}"
  current_amp: "{{ states(charger_entity) | int(0) }}"
  current_block: "{{ states(time_block_entity) | int(0) }}"

  block_limit_w: >
    {% if current_block == 1 %}
      {{ agreed_power_block_1 | float(0) }}
    {% elif current_block == 2 %}
      {{ agreed_power_block_2 | float(0) }}
    {% elif current_block == 3 %}
      {{ agreed_power_block_3 | float(0) }}
    {% elif current_block == 4 %}
      {{ agreed_power_block_4 | float(0) }}
    {% elif current_block == 5 %}
      {{ agreed_power_block_5 | float(0) }}
    {% else %}
      0
    {% endif %}

  next_up: >
    {% set v = valid_amps %}
    {% set c = current_amp %}
    {% set up = v | select('gt', c) | list %}
    {{ up[0] if up | length > 0 else c }}

  next_down: >
    {% set v = valid_amps %}
    {% set c = current_amp %}
    {% set down = v | select('lt', c) | list %}
    {{ down[-1] if down | length > 0 else c }}

  should_decrease: >
    {{ current_block in [1,2,3,4,5] and grid_power > block_limit_w }}

  should_increase: >
    {{ current_block in [1,2,3,4,5] and grid_power < (block_limit_w - tolerance) }}

  new_amp: >
    {% if should_decrease %}
      {{ next_down | int }}
    {% elif should_increase %}
      {{ next_up | int }}
    {% else %}
      {{ current_amp | int }}
    {% endif %}

  delta_amp: "{{ (new_amp | int) - (current_amp | int) }}"

action:
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ valid_amps | length > 0
                 and current_block in [1,2,3,4,5]
                 and delta_amp != 0 }}
        sequence:
          - service: number.set_value
            target:
              entity_id: !input charger_entity
            data:
              value: "{{ new_amp | int }}"
