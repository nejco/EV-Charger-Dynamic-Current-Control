blueprint:
  name: EV Charger Dynamic Current Control (SI Time Blocks)
  description: >
    Dynamically adjusts EV charger current to stay near the agreed power for the
    current Slovenian omrežnina time block. Supports custom charger current steps,
    charger entity, power meter entity, tolerance, and agreed power for blocks 1-5.
  domain: automation
  input:
    charger_entity:
      name: Charger current entity
      description: Number entity used to set charger current.
      selector:
        entity:
          domain: number

    power_meter_entity:
      name: Power meter entity
      description: Sensor with net grid power in watts. Positive should mean import from grid.
      selector:
        entity:
          domain: sensor

    supported_current_settings:
      name: Supported current settings
      description: Comma-separated list of allowed charging currents, e.g. 6,8,10,13,16
      default: "6,8,10,13,16"
      selector:
        text: {}

    tolerance:
      name: Tolerance
      description: Allowed deviation from the agreed power before current is adjusted.
      default: 300
      selector:
        number:
          min: 0
          max: 10000
          step: 50
          unit_of_measurement: W
          mode: box

    agreed_power_block_1:
      name: Agreed power - block 1
      description: Agreed power for Slovenian time block 1.
      default: 7.0
      selector:
        number:
          min: 0
          max: 50
          step: 0.1
          unit_of_measurement: kW
          mode: box

    agreed_power_block_2:
      name: Agreed power - block 2
      description: Agreed power for Slovenian time block 2.
      default: 7.0
      selector:
        number:
          min: 0
          max: 50
          step: 0.1
          unit_of_measurement: kW
          mode: box

    agreed_power_block_3:
      name: Agreed power - block 3
      description: Agreed power for Slovenian time block 3.
      default: 7.0
      selector:
        number:
          min: 0
          max: 50
          step: 0.1
          unit_of_measurement: kW
          mode: box

    agreed_power_block_4:
      name: Agreed power - block 4
      description: Agreed power for Slovenian time block 4.
      default: 7.0
      selector:
        number:
          min: 0
          max: 50
          step: 0.1
          unit_of_measurement: kW
          mode: box

    agreed_power_block_5:
      name: Agreed power - block 5
      description: Agreed power for Slovenian time block 5.
      default: 7.0
      selector:
        number:
          min: 0
          max: 50
          step: 0.1
          unit_of_measurement: kW
          mode: box

mode: single

trigger:
  - platform: time_pattern
    minutes: "/1"

variables:
  charger_entity: !input charger_entity
  power_meter_entity: !input power_meter_entity
  tolerance: !input tolerance
  supported_current_settings_raw: !input supported_current_settings

  agreed_power_block_1: !input agreed_power_block_1
  agreed_power_block_2: !input agreed_power_block_2
  agreed_power_block_3: !input agreed_power_block_3
  agreed_power_block_4: !input agreed_power_block_4
  agreed_power_block_5: !input agreed_power_block_5

  valid_amps: >
    {{ supported_current_settings_raw
       .split(',')
       | map('trim')
       | reject('eq', '')
       | map('int')
       | unique
       | list
       | sort }}

  grid_power: "{{ states(power_meter_entity) | float(0) }}"
  current_amp: "{{ states(charger_entity) | int(0) }}"

  current_month: "{{ now().month }}"
  current_hour: "{{ now().hour }}"
  today_md: "{{ now().strftime('%m-%d') }}"
  is_weekend: "{{ now().weekday() >= 5 }}"
  is_high_season: "{{ current_month in [11, 12, 1, 2] }}"

  fixed_work_free_days: >
    {{ [
      '01-01', '01-02',
      '02-08',
      '04-27',
      '05-01', '05-02',
      '06-25',
      '08-15',
      '10-31',
      '11-01',
      '12-25', '12-26'
    ] }}

  easter_sunday_md: >-
    {% set y = now().year %}
    {% set a = y % 19 %}
    {% set b = y // 100 %}
    {% set c = y % 100 %}
    {% set d = b // 4 %}
    {% set e = b % 4 %}
    {% set f = (b + 8) // 25 %}
    {% set g = (b - f + 1) // 3 %}
    {% set h = (19 * a + b - d - g + 15) % 30 %}
    {% set i = c // 4 %}
    {% set k = c % 4 %}
    {% set l = (32 + 2 * e + 2 * i - h - k) % 7 %}
    {% set m = (a + 11 * h + 22 * l) // 451 %}
    {% set emonth = (h + l - 7 * m + 114) // 31 %}
    {% set eday = ((h + l - 7 * m + 114) % 31) + 1 %}
    {{ '%02d-%02d' | format(emonth, eday) }}

  easter_monday_md: >-
    {% set easter = strptime(now().year ~ '-' ~ easter_sunday_md, '%Y-%m-%d') %}
    {{ (easter + timedelta(days=1)).strftime('%m-%d') }}

  is_work_free_day: >
    {{ is_weekend or today_md in fixed_work_free_days or today_md == easter_monday_md }}

  current_block: >-
    {% set h = current_hour | int %}
    {% if is_high_season %}
      {% if is_work_free_day %}
        {% if (6 <= h < 12) or (17 <= h < 22) %}
          3
        {% else %}
          4
        {% endif %}
      {% else %}
        {% if (6 <= h < 12) or (17 <= h < 20) %}
          1
        {% elif (12 <= h < 17) or (20 <= h < 22) %}
          2
        {% else %}
          3
        {% endif %}
      {% endif %}
    {% else %}
      {% if is_work_free_day %}
        {% if (6 <= h < 12) or (17 <= h < 22) %}
          4
        {% else %}
          5
        {% endif %}
      {% else %}
        {% if (6 <= h < 12) or (17 <= h < 22) %}
          3
        {% elif 12 <= h < 17 %}
          4
        {% else %}
          5
        {% endif %}
      {% endif %}
    {% endif %}

  agreed_power_kw: >-
    {% set b = current_block | int %}
    {% if b == 1 %}
      {{ agreed_power_block_1 | float(0) }}
    {% elif b == 2 %}
      {{ agreed_power_block_2 | float(0) }}
    {% elif b == 3 %}
      {{ agreed_power_block_3 | float(0) }}
    {% elif b == 4 %}
      {{ agreed_power_block_4 | float(0) }}
    {% else %}
      {{ agreed_power_block_5 | float(0) }}
    {% endif %}

  target_power_w: "{{ (agreed_power_kw | float(0) * 1000) | round(0) }}"

  should_increase: "{{ grid_power < (target_power_w - tolerance) }}"
  should_decrease: "{{ grid_power > (target_power_w + tolerance) }}"

  next_up: >
    {% set v = valid_amps %}
    {% set c = current_amp %}
    {% set up = v | select('gt', c) | list %}
    {{ up[0] if up | length > 0 else c }}

  next_down: >
    {% set v = valid_amps %}
    {% set c = current_amp %}
    {% set down = v | select('lt', c) | list %}
    {{ down[-1] if down | length > 0 else c }}

  new_amp: >
    {% if should_increase %}
      {{ next_up | int }}
    {% elif should_decrease %}
      {{ next_down | int }}
    {% else %}
      {{ current_amp | int }}
    {% endif %}

  delta_amp: "{{ (new_amp | int) - (current_amp | int) }}"

action:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ valid_amps | length > 0 and delta_amp != 0 }}"
        sequence:
          - service: number.set_value
            target:
              entity_id: !input charger_entity
            data:
              value: "{{ new_amp | int }}"